<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Loopli">
<meta name="theme-color" content="#1e6b45">
<title>Loopli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
:root{
  --g:#1e6b45;--gm:#2d8a5a;--gl:#e4f4ec;--gxl:#f0faf5;
  --ink:#0f1a14;--ink2:#3a4f42;--ink3:#7a9085;
  --bg:#f7faf8;--card:#ffffff;--border:#dce8e1;--border2:#b8d4c4;
  --red:#c0392b;--redl:#fdecea;
  --r:12px;--rl:16px;
  --mono:ui-monospace,'SF Mono','Courier New',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --nav-h:60px;
}
html{height:100%;background:var(--bg)}
body{
  font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5;
  height:100%;overflow:hidden;
}

/* ── AUTH OVERLAY ── */
.auth-ov{
  position:fixed;inset:0;background:var(--bg);z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
  padding-top:calc(var(--safe-t) + 40px);
  padding-bottom:calc(var(--safe-b) + 24px);
  overflow-y:auto;
}
.auth-brand{font-size:38px;font-weight:800;color:var(--g);letter-spacing:-1.5px;margin-bottom:4px}
.auth-tagline{font-size:14px;color:var(--ink3);margin-bottom:32px;text-align:center;line-height:1.5}
.auth-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--rl);
  padding:24px;width:100%;max-width:400px;
}
.auth-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:18px}
.auth-err{
  font-size:13px;color:var(--red);background:var(--redl);
  border-radius:8px;padding:10px 12px;margin-bottom:12px;
  display:none;line-height:1.5;
}
.auth-err.show{display:block}
.auth-toggle{text-align:center;margin-top:16px;font-size:14px;color:var(--ink3)}
.auth-toggle a{color:var(--g);font-weight:600;cursor:pointer;text-decoration:underline}
.auth-secure{
  display:flex;align-items:center;justify-content:center;
  gap:6px;margin-top:24px;font-size:12px;color:var(--ink3);
}
.auth-secure svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;opacity:.5}

/* ── SHELL ── */
.shell{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ── TOP BAR ── */
.topbar{
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:calc(var(--safe-t) + 10px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  position:relative;z-index:10;
}
.topbar-brand{font-size:20px;font-weight:700;color:var(--g);letter-spacing:-.4px}
.topbar-right{display:flex;align-items:center;gap:8px}
.saved-badge{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:4px}
.saved-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0}

/* ── SCROLL AREA ── */
.scroll-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:16px 16px calc(var(--nav-h) + var(--safe-b) + 16px);
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  border-top:1px solid var(--border);
  z-index:20;
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
}
.bnav-scroll{
  display:flex;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding:6px 0 calc(var(--safe-b) + 2px);
}
.bnav-scroll::-webkit-scrollbar{display:none}
.bnav{
  flex:1 0 58px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--ink3);font-size:9px;font-weight:500;
  cursor:pointer;padding:2px 0;
  transition:color .15s;
  -webkit-user-select:none;user-select:none;
}
.bnav svg{width:22px;height:22px;stroke-width:1.8;stroke:currentColor;fill:none;margin-bottom:1px}
.bnav.active{color:var(--g)}
.bnav.active svg{stroke-width:2.2}

/* ── PAGE TITLE ── */
.ptitle{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.5px;margin-bottom:4px}
.psub{font-size:13px;color:var(--ink3);margin-bottom:16px}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.card-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3);margin-bottom:12px}

/* ── PROFIT HERO ── */
.profit-hero{
  border-radius:var(--rl);padding:18px 16px;margin-bottom:12px;text-align:center;
  background:var(--gl);
}
.profit-hero.neg{background:var(--redl)}
.ph-product{font-size:13px;font-weight:500;color:var(--ink3);margin-bottom:6px;min-height:20px}
.ph-amount{font-size:38px;font-weight:700;font-family:var(--mono);color:var(--g);letter-spacing:-1px;line-height:1}
.ph-amount.neg{color:var(--red)}
.ph-row{display:flex;justify-content:center;gap:20px;margin-top:10px}
.ph-stat{text-align:center}
.ph-stat-val{font-size:15px;font-weight:600;font-family:var(--mono);color:var(--ink)}
.ph-stat-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

/* ── CONFIRM BTN ── */
.btn-confirm{
  width:100%;padding:15px;background:var(--g);color:#fff;
  border:none;border-radius:var(--r);
  font-family:inherit;font-size:16px;font-weight:600;
  cursor:pointer;letter-spacing:.1px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:12px;
  -webkit-appearance:none;
}
.btn-confirm:active{opacity:.85}
.btn-confirm:disabled{opacity:.6;cursor:default}
.btn-confirm svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5}

/* ── FORM FIELDS ── */
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field-full{margin-bottom:12px}
.field-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:block}
.field-input{
  width:100%;padding:12px 13px;
  border:1.5px solid var(--border);border-radius:var(--r);
  font-family:inherit;font-size:16px;color:var(--ink);
  background:var(--card);outline:none;
  -webkit-appearance:none;appearance:none;
}
.field-input:focus{border-color:var(--gm);box-shadow:0 0 0 3px rgba(30,107,69,.1)}
.field-input.hl{background:#fffef5;border-color:#fcd34d}
.field-input.hl:focus{border-color:var(--gm)}

/* ── MATERIAL ROWS ── */
.sec-label{
  font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:6px 10px;border-radius:8px;margin:10px 0 6px;display:block;
}
.mat-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.mat-row:last-child{border-bottom:none}
.mat-name{flex:1;font-size:14px;color:var(--ink2)}
.mat-qty-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.mat-qty{
  width:72px;padding:8px 8px;text-align:right;
  border:1.5px solid #fcd34d;border-radius:8px;
  font-family:var(--mono);font-size:14px;color:var(--ink);
  background:#fffef5;outline:none;-webkit-appearance:none;
}
.mat-qty:focus{border-color:var(--gm);background:var(--gxl)}
.mat-unit{font-size:11px;color:var(--ink3);font-family:var(--mono);width:32px}
.mat-lc{font-size:12px;font-family:var(--mono);color:var(--g);font-weight:500;width:54px;text-align:right}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-bottom:4px}
.kpi-val{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--ink);letter-spacing:-.5px}
.kpi-val.g{color:var(--g)}

/* ── LOG CARDS ── */
.log-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:8px}
.log-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.log-card-name{font-size:15px;font-weight:600;color:var(--ink)}
.log-card-profit{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--g)}
.log-card-profit.neg{color:var(--red)}
.log-card-meta{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.log-card-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.log-stat{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.log-stat span:first-child{color:var(--ink3)}
.log-stat span:last-child{font-family:var(--mono);font-weight:500}
.log-card-del{background:none;border:none;color:var(--border2);font-size:18px;cursor:pointer;padding:2px 4px;line-height:1;flex-shrink:0}
.log-card-del:active{color:var(--red)}

.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tab-toggle{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--ink3);cursor:pointer;font-family:inherit}
.tab-toggle.active{background:var(--g);color:#fff;border-color:var(--g)}
.chip-doll{background:#e0f2fe;color:#0369a1}
.chip-pacifier{background:#fce7f3;color:#be185d}
.chip-rattle{background:#fef3c7;color:#b45309}
.chip-icord{background:#ede9fe;color:#6d28d9}
.chip-set{background:#ccfbf1;color:#0f766e}
.chip-blanket{background:#fff1f2;color:#be123c}

/* ── TYPE CARDS ── */
.type-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.type-card-title{font-size:14px;font-weight:600;margin-bottom:10px}
.tstat{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)}
.tstat:last-child{border-bottom:none}
.tstat span:last-child{font-family:var(--mono);font-weight:500}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.btn-sec{
  padding:10px 16px;background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:500;
  color:var(--ink2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  -webkit-appearance:none;
}
.btn-sec:active{background:var(--gl)}
.btn-sec.danger{color:var(--red);border-color:#fca5a5}
.btn-pri{
  flex:1;padding:13px;background:var(--g);color:#fff;
  border:none;border-radius:var(--r);font-family:inherit;font-size:15px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  -webkit-appearance:none;
}
.btn-pri:active{opacity:.85}
.btn-pri svg,.btn-sec svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 16px;color:var(--ink3)}
.empty-icon{font-size:40px;display:block;margin-bottom:10px;opacity:.4}
.empty p{font-size:14px}

/* ── IMPORT DROP ── */
.drop-zone{
  border:2px dashed var(--border2);border-radius:var(--r);
  padding:28px 16px;text-align:center;cursor:pointer;
  background:var(--gxl);margin-bottom:12px;
}
.drop-zone p{font-size:14px;color:var(--ink3)}
.drop-zone strong{color:var(--g)}

/* ── DIVIDER ── */
.div{height:1px;background:var(--border);margin:14px 0}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:calc(var(--safe-t) + 60px);left:16px;right:16px;z-index:100;pointer-events:none}
.toast{
  background:var(--ink);color:#fff;padding:12px 16px;border-radius:var(--r);
  font-size:14px;font-weight:500;opacity:0;transform:translateY(-8px);
  transition:all .2s;text-align:center;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--g)}
.toast.err{background:var(--red)}

#file-inp{display:none}
</style>
</head>
<body>

<!-- ── AUTH OVERLAY ─────────────────────────────────────────────────────────── -->
<div id="auth-ov" class="auth-ov">
  <div class="auth-brand">Loopli</div>
  <div class="auth-tagline">Your craft business,<br>synced on every device</div>
  <div class="auth-card">
    <div class="auth-title" id="auth-title">Welcome back</div>
    <div class="auth-err" id="auth-err"></div>
    <div class="field-full">
      <label class="field-label">Email</label>
      <input class="field-input" type="email" id="auth-email" placeholder="you@example.com"
        autocomplete="email" inputmode="email">
    </div>
    <div class="field-full" style="margin-bottom:18px">
      <label class="field-label">Password</label>
      <input class="field-input" type="password" id="auth-pw" placeholder="••••••••"
        autocomplete="current-password">
    </div>
    <button class="btn-confirm" id="auth-btn" onclick="authSubmit()" style="margin-bottom:0">Sign in</button>
    <div class="auth-toggle">
      <span id="auth-toggle-txt">Don't have an account?</span>
      <a onclick="toggleAuthMode()"> Create one</a>
    </div>
  </div>
  <div class="auth-secure">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    Data encrypted &amp; stored securely with Firebase
  </div>
</div>

<!-- ── APP SHELL ────────────────────────────────────────────────────────────── -->
<div class="shell">
  <div class="topbar">
    <div class="topbar-brand">Loopli</div>
    <div class="topbar-right">
      <div class="saved-badge"><span class="saved-dot" id="sdot"></span><span id="slbl">Saved</span></div>
    </div>
  </div>

  <div class="scroll-area" id="main"></div>

  <div class="bottom-nav">
    <div class="bnav-scroll">
    <div class="bnav active" onclick="go('doll')" id="bn-doll">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>Doll
    </div>
    <div class="bnav" onclick="go('pacifier')" id="bn-pacifier">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></svg>Pacifier
    </div>
    <div class="bnav" onclick="go('rattle')" id="bn-rattle">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Rattle
    </div>
    <div class="bnav" onclick="go('icord')" id="bn-icord">
      <svg viewBox="0 0 24 24"><path d="M4 7c4 0 4 10 8 10S16 7 20 7" stroke-linecap="round"/></svg>I-cord
    </div>
    <div class="bnav" onclick="go('set')" id="bn-set">
      <svg viewBox="0 0 24 24"><rect x="3" y="9" width="18" height="12" rx="1"/><path d="M3 9l4-5h10l4 5M12 9v12M3 14h18"/></svg>Set
    </div>
    <div class="bnav" onclick="go('blanket')" id="bn-blanket">
      <svg viewBox="0 0 24 24"><path d="M3 7c2-2 4 0 6-2s4-2 6 0 4 2 6 0M3 12c2-2 4 0 6-2s4-2 6 0 4 2 6 0M3 17c2-2 4 0 6-2s4-2 6 0 4 2 6 0"/></svg>Blanket
    </div>
    <div class="bnav" onclick="go('log')" id="bn-log">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2M9 12h6M9 16h4"/></svg>Log
    </div>
    <div class="bnav" onclick="go('more')" id="bn-more">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.5" fill="currentColor" stroke="none"/></svg>More
    </div>
    </div>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>
<input type="file" id="file-inp" accept=".json">

<!-- ── CUSTOM MATERIAL MODAL ──────────────────────────────────────────────────── -->
<div id="cmat-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end" onclick="if(event.target===this)closeCMat()">
  <div style="background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 16px calc(var(--safe-b) + 24px)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div id="cmat-title" style="font-size:18px;font-weight:700;color:var(--ink)">Add Material</div>
      <button onclick="closeCMat()" style="background:none;border:none;font-size:24px;color:var(--ink3);cursor:pointer;line-height:1;padding:4px">✕</button>
    </div>
    <div class="field-full">
      <label class="field-label">Material name</label>
      <input class="field-input hl" id="cmat-n" type="text" placeholder="e.g. Felt fabric">
    </div>
    <div class="field-row">
      <div>
        <label class="field-label">Pack price ($)</label>
        <input class="field-input" id="cmat-pp" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00">
      </div>
      <div>
        <label class="field-label">Pack qty</label>
        <input class="field-input" id="cmat-pq" type="number" min="1" step="1" inputmode="numeric" placeholder="1">
      </div>
    </div>
    <div class="field-full" style="margin-top:10px">
      <label class="field-label">Unit (e.g. pcs, gram, meter)</label>
      <input class="field-input" id="cmat-u" type="text" placeholder="pcs">
    </div>
    <div style="margin-top:16px">
      <div class="field-label" style="margin-bottom:10px">Add to product tabs</div>
      <div id="cmat-tabs" style="display:flex;flex-wrap:wrap;gap:8px"></div>
    </div>
    <button class="btn-pri" onclick="saveCMat()" style="margin-top:20px;width:100%">Save material</button>
    <button id="cmat-del" onclick="deleteCMat()" style="display:none;margin-top:10px;width:100%;padding:13px;background:var(--redl);color:var(--red);border:1px solid #fca5a5;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">Delete material</button>
  </div>
</div>

<!-- ── EDIT MODAL ────────────────────────────────────────────────────────────── -->
<div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end">
  <div style="background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px calc(var(--safe-b) + 24px)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-size:18px;font-weight:700;color:var(--ink)">Edit Product</div>
      <button onclick="closeEdit()" style="background:none;border:none;font-size:24px;color:var(--ink3);cursor:pointer;line-height:1;padding:4px">✕</button>
    </div>
    <div class="field-full">
      <label class="field-label">Product name</label>
      <input class="field-input hl" type="text" id="edit-name" placeholder="Product name">
    </div>
    <div class="field-row">
      <div>
        <label class="field-label">Qty made</label>
        <input class="field-input" type="number" min="1" step="1" inputmode="numeric" id="edit-qty">
      </div>
      <div>
        <label class="field-label">Sell price ($)</label>
        <input class="field-input hl" type="number" min="0" step="0.5" inputmode="decimal" id="edit-sell">
      </div>
    </div>
    <div class="field-row">
      <div>
        <label class="field-label">Time (hours)</label>
        <input class="field-input" type="number" min="0" step="0.5" inputmode="decimal" id="edit-time">
      </div>
      <div id="edit-size-wrap">
        <label class="field-label" id="edit-size-lbl">Size (cm)</label>
        <input class="field-input" type="number" min="0" step="0.5" inputmode="decimal" id="edit-size">
      </div>
    </div>
    <div class="field-row" id="edit-lh-wrap" style="display:none">
      <div>
        <label class="field-label">Length (cm)</label>
        <input class="field-input" type="number" min="0" step="0.5" inputmode="decimal" id="edit-sizeL">

// ── CALCULATOR ────────────────────────────────────────────────────────────────
function rCalc(type){
  if(!S.c[type])S.c[type]={name:'',sell:'',qty_made:1,time:'',size:'',sizeL:'',sizeH:'',qty:{}};
  const s=S.c[type];
  const unitCost=cost(type);
  const sell=parseFloat(s.sell)||0;
  const qty=parseInt(s.qty_made)||1;
  const timeHr=parseFloat(s.time)||0;
  const profit=sell-unitCost;
  const margin=sell>0?profit/sell:NaN;
  const hourly=timeHr>0?profit/timeHr:NaN;
  const isNeg=profit<0&&sell>0;

  let shtml='';
  SECS[type].forEach(sec=>{
    shtml+=`<span class="sec-label" style="background:${sec.bg};color:${sec.fg}">${sec.lbl}</span>`;
    sec.mats.forEach(m=>{
      const q=gq(type,m.id);
      const lc=q>0?usd(q*getMC(m)):'';
      shtml+=`<div class="mat-row">
        <span class="mat-name">${m.n}</span>
        <div class="mat-qty-wrap">
          <input class="mat-qty" type="number" min="0" step="0.1" inputmode="decimal"
            value="${q||''}" placeholder="0"
            oninput="sqty('${type}',${m.id},this.value)">
          <span class="mat-unit">${m.u}</span>
          <span class="mat-lc">${lc}</span>
        </div>
      </div>`;
    });
  });
  const cMatsForType=(S.customMats||[]).filter(m=>m.tabs.includes(type));
  if(cMatsForType.length){
    shtml+=`<span class="sec-label" style="background:#f0fdf4;color:#065f46">Custom</span>`;
    cMatsForType.forEach(m=>{
      const q=gq(type,m.id);
      const lc=q>0?usd(q*getMC(m)):'';
      shtml+=`<div class="mat-row">
        <span class="mat-name">${m.n}</span>
        <div class="mat-qty-wrap">
          <input class="mat-qty" type="number" min="0" step="0.1" inputmode="decimal"
            value="${q||''}" placeholder="0"
            oninput="sqty('${type}',${m.id},this.value)">
          <span class="mat-unit">${m.u}</span>
          <span class="mat-lc">${lc}</span>
        </div>
      </div>`;
    });
  }

  return`
    <div class="profit-hero${isNeg?' neg':''}">
      <div class="ph-product">${s.name||'New '+cap(type)}</div>
      <div class="ph-amount${isNeg?' neg':''}">${usd(profit)}</div>
      <div class="ph-row">
        <div class="ph-stat"><div class="ph-stat-val">${pct(margin)}</div><div class="ph-stat-lbl">margin</div></div>
        <div class="ph-stat"><div class="ph-stat-val">${usd(unitCost)}</div><div class="ph-stat-lbl">unit cost</div></div>
        <div class="ph-stat"><div class="ph-stat-val">${usd(unitCost*qty)}</div><div class="ph-stat-lbl">total cost ×${qty}</div></div>
        ${timeHr>0?`<div class="ph-stat" id="ph-hourly"><div class="ph-stat-val">${usd(hourly)}/hr</div><div class="ph-stat-lbl">hourly rate</div></div>`:'<div class="ph-stat" id="ph-hourly" style="display:none"></div>'}
      </div>
    </div>

    <div id="autofill-hint" style="display:none;background:var(--gl);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;margin-bottom:12px;align-items:center;justify-content:space-between;gap:10px">
      <span style="font-size:13px;color:var(--g);font-weight:500">Found previous settings — load them?</span>
      <button onclick="applyAutoFill()" style="padding:7px 16px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;font-family:inherit">Load</button>
    </div>

    <button class="btn-confirm" onclick="confirm_add('${type}')">
      <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
      Confirm &amp; save to log
    </button>

    <div class="card">
      <div class="card-label">Product details</div>
      <div class="field-full">
        <label class="field-label">Product name</label>
        <input class="field-input hl" type="text" placeholder="e.g. Rosie the Bear"
          value="${s.name||''}" oninput="sname('${type}',this.value)">
      </div>
      <div class="field-row">
        <div>
          <label class="field-label">Qty to make</label>
          <input class="field-input" type="number" min="1" step="1" inputmode="numeric"
            value="${qty}" oninput="sqm('${type}',this.value)">
        </div>
        <div>
          <label class="field-label">Sell price ($)</label>
          <input class="field-input hl" type="number" min="0" step="0.5" inputmode="decimal"

          <label class="field-label">Length (cm)</label>

        <div>

        </div>
      </div>`}
    </div>

    <div class="card">
      <div class="card-label">Materials used</div>
      ${shtml}
    </div>`;
}

// ── LOG ───────────────────────────────────────────────────────────────────────
function rLog(){
  const log=S.log;
  const tRev=log.reduce((a,r)=>a+r.sell*r.qty,0);
  const tCost=log.reduce((a,r)=>a+r.cost*r.qty,0);
  const tP=tRev-tCost;

  const nameCounts={};
  log.forEach(r=>{nameCounts[r.name]=(nameCounts[r.name]||0)+1;});

  let cards='';
  if(!log.length){
    cards=`<div class="empty"><span class="empty-icon">📋</span><p>No products yet.<br>Confirm an entry from the calculator.</p></div>`;
  }else{
    [...log].reverse().forEach((r,ri)=>{
      const i=log.length-1-ri;
      const rev=r.sell*r.qty,cost=r.cost*r.qty,profit=rev-cost;
      const neg=profit<0;
      const cnt=nameCounts[r.name]||1;
      const hasMats=r.mats&&r.mats.length>0;
      const matsHtml=hasMats?r.mats.map(m=>`
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">
          <span style="color:var(--ink2)">${m.n}</span>
          <span style="font-family:var(--mono);color:var(--ink3)">${m.q} ${m.u} · <span style="color:var(--g)">${usd(m.lc)}</span></span>
        </div>`).join(''):'';
      cards+=`<div class="log-card" data-logname="${r.name.replace(/"/g,'&quot;')}">
        <div class="log-card-top">
          <div>
            <div class="log-card-name">${r.name}</div>
            <div class="log-card-meta" style="margin-top:4px">
              <span class="chip chip-${r.type}">${r.type}</span>
              <span style="font-size:11px;color:var(--ink3)">${r.date}</span>
              ${r.time?`<span style="font-size:11px;color:var(--ink3)">⏱ ${r.time} hr</span>`:''}
              ${r.type==='icord'&&(r.sizeL||r.sizeH)?`<span style="font-size:11px;color:var(--ink3)">${r.sizeL||'?'}×${r.sizeH||'?'} cm (L×W)</span>`:r.size?`<span style="font-size:11px;color:var(--ink3)">${r.size} cm</span>`:''}
              ${cnt>1?`<span style="font-size:11px;background:var(--gl);color:var(--g);padding:2px 8px;border-radius:10px;font-weight:600">×${cnt} made</span>`:''}
            </div>
          </div>
          <div style="text-align:right">
            <div class="log-card-profit${neg?' neg':''}">${usd(profit)}</div>
            <div style="display:flex;gap:2px;justify-content:flex-end;margin-top:4px">
              <button class="log-card-del" onclick="editLog(${i})" style="color:var(--ink3);font-size:16px">✏️</button>
              <button class="log-card-del" onclick="delLog(${i})">✕</button>
            </div>
          </div>
        </div>
        <div class="log-card-stats">
          <div class="log-stat"><span>Qty</span><span>${r.qty}</span></div>
          <div class="log-stat"><span>Unit cost</span><span>${usd(r.cost)}</span></div>
          <div class="log-stat"><span>Sell price</span><span>${usd(r.sell)}</span></div>
          <div class="log-stat"><span>Revenue</span><span>${usd(rev)}</span></div>
        </div>
        ${hasMats?`
        <div id="ld-${i}" style="display:none;margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-bottom:6px">Materials used</div>
          ${matsHtml}
        </div>
        <button id="lb-${i}" onclick="toggleMats(${i})"
          style="width:100%;margin-top:10px;padding:7px;background:var(--gxl);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--ink3);cursor:pointer;font-family:inherit;font-weight:500">
          ▼ Show materials
        </button>`:''}
      </div>`;
    });
  }

  return`
    <div class="ptitle">Product Log</div>
    <div class="psub">${log.length} product${log.length!==1?'s':''}</div>
    <div style="margin-bottom:14px">
      <input class="field-input" type="search" placeholder="Search by product name..."
        value="${logSearch.replace(/"/g,'&quot;')}"
        oninput="slogSearch(this.value)"
        style="width:100%;padding:10px 14px;font-size:14px">
    </div>

    ${log.length?`<div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl">Total revenue</div><div class="kpi-val">${usd(tRev)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Total cost</div><div class="kpi-val">${usd(tCost)}</div></div>
      <div class="kpi" style="grid-column:1/-1"><div class="kpi-lbl">Total profit</div><div class="kpi-val g">${usd(tP)}</div></div>
    </div>`:''}

    ${cards}

    ${log.length?`<div class="btn-row">
      <button class="btn-sec" onclick="expCSV()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Export CSV
      </button>
      <button class="btn-sec danger" onclick="clrLog()">Clear all</button>
    </div>`:''}`;
}

// ── MORE ──────────────────────────────────────────────────────────────────────
function rMore(){
  const log=S.log;

      ].map(sec=>`
        <span class="sec-label" style="background:${sec.bg};color:${sec.fg}">${sec.lbl}</span>

function sname(t,v){
  S.c[t].name=v;upd(t);save();
  const name=v.trim();
  const hint=document.getElementById('autofill-hint');
  if(name.length>1){
    const match=[...S.log].reverse().find(r=>r.type===t&&r.name.toLowerCase()===name.toLowerCase()&&r.mats&&r.mats.length);
    if(match){
      pendingAutoFill={type:t,entry:match};
      if(hint)hint.style.display='flex';
    }else{
      pendingAutoFill=null;
      if(hint)hint.style.display='none';
    }
  }else{
    pendingAutoFill=null;
    if(hint)hint.style.display='none';
  }
}
function ssell(t,v){S.c[t].sell=v;upd(t);save()}
function sqm(t,v){S.c[t].qty_made=parseInt(v)||1;upd(t);save()}
function sqt(t,v){S.c[t].time=v;upd(t);save()}
function ssize(t,v){S.c[t].size=v;save()}
function ssizeL(t,v){S.c[t].sizeL=v;save()}
function ssizeH(t,v){S.c[t].sizeH=v;save()}
function slogSearch(v){
  logSearch=v;
  const q=v.toLowerCase().trim();
  document.querySelectorAll('[data-logname]').forEach(el=>{
    el.style.display=(!q||el.dataset.logname.toLowerCase().includes(q))?'':'none';
  });
}
function sqty(t,id,v){
  if(!S.c[t].qty)S.c[t].qty={};
  S.c[t].qty[id]=parseFloat(v)||0;
  upd(t);save();
}

function upd(type){
  const s=S.c[type];
  const unitCost=cost(type);
  const sell=parseFloat(s.sell)||0;
  const qty=parseInt(s.qty_made)||1;
  const profit=sell-unitCost;
  const margin=sell>0?profit/sell:NaN;
  const isNeg=profit<0&&sell>0;

  const timeHr=parseFloat(s.time)||0;
  const hourly=timeHr>0?profit/timeHr:NaN;

  const hero=document.querySelector('.profit-hero');
  if(hero){
    hero.className='profit-hero'+(isNeg?' neg':'');
    const pn=hero.querySelector('.ph-product');
    const pa=hero.querySelector('.ph-amount');
    const stats=hero.querySelectorAll('.ph-stat-val');
    if(pn)pn.textContent=s.name||'New '+cap(type);
    if(pa){pa.textContent=usd(profit);pa.className='ph-amount'+(isNeg?' neg':'')}
    if(stats[0])stats[0].textContent=pct(margin);
    if(stats[1])stats[1].textContent=usd(unitCost);
    if(stats[2])stats[2].textContent=usd(unitCost*qty);
    const hEl=document.getElementById('ph-hourly');
    if(hEl){
      hEl.style.display=timeHr>0?'':'none';
      const hv=hEl.querySelector('.ph-stat-val');
      if(hv)hv.textContent=usd(hourly)+'/hr';
    }
  }
  const allMats=[];
  SECS[type].forEach(sec=>sec.mats.forEach(m=>allMats.push(m)));
  (S.customMats||[]).filter(m=>m.tabs.includes(type)).forEach(m=>allMats.push(m));
  document.querySelectorAll('.mat-lc').forEach((el,i)=>{
    if(allMats[i]){const m=allMats[i];const q=gq(type,m.id);el.textContent=q>0?usd(q*getMC(m)):''}
  });
}

function confirm_add(type){
  const s=S.c[type];
  const name=(s.name||'').trim();
  if(!name){toast('Enter a product name first','err');return}
  const unitCost=cost(type);
  const sell=parseFloat(s.sell)||0;
  const qty=parseInt(s.qty_made)||1;
  const timeHr=parseFloat(s.time)||0;
  const size=parseFloat(s.size)||0;
  const sizeL=parseFloat(s.sizeL)||0;
  const sizeH=parseFloat(s.sizeH)||0;
  const mats=[
    ...SECS[type].flatMap(sec=>sec.mats.map(m=>({id:m.id,n:m.n,u:m.u,q:gq(type,m.id),lc:gq(type,m.id)*getMC(m)})).filter(m=>m.q>0)),
    ...(S.customMats||[]).filter(m=>m.tabs.includes(type)).map(m=>({id:m.id,n:m.n,u:m.u,q:gq(type,m.id),lc:gq(type,m.id)*getMC(m)})).filter(m=>m.q>0)
  ];
  S.log.push({name,type,qty,cost:unitCost,sell,date:new Date().toLocaleDateString('en-GB'),time:timeHr,size,sizeL,sizeH,mats});
  S.c[type]={name:'',sell:'',qty_made:1,time:'',size:'',sizeL:'',sizeH:'',qty:{}};
  save();
  toast('"'+name+'" saved ✓');
  render();
}

function applyAutoFill(){
  if(!pendingAutoFill)return;
  const{type,entry}=pendingAutoFill;
  const qty={};
  (entry.mats||[]).forEach(m=>{
    const id=m.id!=null?m.id:MAT_BY_NAME[m.n];
    if(id!=null)qty[id]=m.q;
  });
  S.c[type].qty=qty;
  S.c[type].sell=String(entry.sell||'');
  S.c[type].time=String(entry.time||'');
  S.c[type].size=String(entry.size||'');
  S.c[type].sizeL=String(entry.sizeL||'');
  S.c[type].sizeH=String(entry.sizeH||'');
  S.c[type].qty_made=entry.qty||1;
  pendingAutoFill=null;
  save();
  render();
  toast('Loaded "'+entry.name+'" — edit if needed ✓');
}

function setMP(id,field,val){

  S.matPrices[id][field]=parseFloat(val)||0;

function closeEdit(){

function saveLogEdit(){
  if(editingIdx===null)return;
  const name=document.getElementById('edit-name').value.trim();
  if(!name){toast('Product name is required','err');return}
  const r=S.log[editingIdx];
  r.name=name;
  r.qty=parseInt(document.getElementById('edit-qty').value)||1;
  r.sell=parseFloat(document.getElementById('edit-sell').value)||0;
  r.time=parseFloat(document.getElementById('edit-time').value)||0;

  r.sizeL=parseFloat(document.getElementById('edit-sizeL').value)||0;
  r.sizeH=parseFloat(document.getElementById('edit-sizeH').value)||0;
  const dv=document.getElementById('edit-date').value;
  if(dv){const p=dv.split('-');r.date=`${p[2]}/${p[1]}/${p[0]}`;}
  // Recalculate cost from edited material quantities
  let newCost=0;
  const newMats=[];
  document.querySelectorAll('#edit-mats .mat-qty').forEach(el=>{
    const id=parseInt(el.dataset.mid);
    const q=parseFloat(el.value)||0;
    if(q>0){
      const m=ALL_MATS.find(x=>x.id===id);
      if(m){const lc=q*getMC(m);newCost+=lc;newMats.push({id:m.id,n:m.n,u:m.u,q,lc});}
    }
  });
  r.cost=newCost;
  r.mats=newMats;
  closeEdit();
  save();
  render();
  toast('Changes saved ✓');
}

function delLog(i){

}
function clrLog(){

}

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function expJSON(){
  const payload={version:1,exported:new Date().toISOString(),log:S.log};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}));
  a.download='loopli_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();toast('Backup downloaded');
}
function expCSV(){
  if(!S.log.length){toast('Nothing to export','err');return}
  const h='Name,Type,Qty,Unit Cost,Sell Price,Revenue,Cost,Profit,Date\n';
  const rows=S.log.map(r=>{
    const rev=r.sell*r.qty,cost=r.cost*r.qty;
    return`"${r.name}","${r.type}",${r.qty},${r.cost.toFixed(4)},${r.sell.toFixed(2)},${rev.toFixed(2)},${cost.toFixed(2)},${(rev-cost).toFixed(2)},"${r.date}"`;
  }).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([h+rows],{type:'text/csv'}));
  a.download='loopli_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();toast('CSV exported');
}
function impJSON(text){
  try{
    const p=JSON.parse(text);
    const logData=p.log||p.data?.log;
    if(!Array.isArray(logData))throw 0;
    if(!confirm('Import '+logData.length+' products? This replaces your current '+S.log.length+' entries.'))return;
    S.log=logData;save();go('log');
    toast('Imported '+logData.length+' products ✓');
  }catch(e){toast('Invalid backup file','err')}
}
$('file-inp').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>impJSON(ev.target.result);r.readAsText(f);
  e.target.value='';
});
function dropF(e){
  e.preventDefault();
  const f=e.dataTransfer?.files?.[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>impJSON(ev.target.result);r.readAsText(f);
}

// ── FIREBASE SYNC ─────────────────────────────────────────────────────────────
function startSync(){
  if(firestoreUnsub)firestoreUnsub();
  firestoreUnsub=db.collection('users').doc(currentUser.uid).onSnapshot(snap=>{
    if(ignoreNextSnap){ignoreNextSnap=false;return}
    if(snap.exists){
      const data=snap.data();
      if(data&&Array.isArray(data.log)){
        S=data;
        try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}
        render();
        const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        setSaved('Synced '+t);
      }
    }
  });
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser=user;
    try{
      const snap=await db.collection('users').doc(user.uid).get();
      if(snap.exists){
        S=snap.data();
      }else{
        // First login — migrate any existing LocalStorage data automatically
        try{
          const raw=localStorage.getItem(KEY);
          if(raw){const parsed=JSON.parse(raw);if(Array.isArray(parsed.log))S=parsed;}
        }catch(e){}
        await db.collection('users').doc(user.uid).set(S);
      }
    }catch(e){
      // Offline fallback — use LocalStorage
      try{const raw=localStorage.getItem(KEY);if(raw)S=JSON.parse(raw);}catch(e2){}
    }
    startSync();
    $('auth-ov').style.display='none';
    render();
  }else{
    currentUser=null;
    if(firestoreUnsub){firestoreUnsub();firestoreUnsub=null;}
    S=defaultState();
    $('auth-ov').style.display='flex';
  }
});

function authSubmit(){
  const email=($('auth-email').value||'').trim();
  const pw=$('auth-pw').value||'';
  const errEl=$('auth-err'),btn=$('auth-btn');
  if(!email||!pw){
    errEl.textContent='Enter your email and password.';
    errEl.className='auth-err show';
    return;
  }
  btn.textContent='Please wait…';
  btn.disabled=true;
  errEl.className='auth-err';
  (authMode==='signin'
    ?auth.signInWithEmailAndPassword(email,pw)
    :auth.createUserWithEmailAndPassword(email,pw)
  ).catch(e=>{
    btn.disabled=false;
    btn.textContent=authMode==='signin'?'Sign in':'Create account';
    const msgs={
      'auth/user-not-found':'No account with that email. Create one?',
      'auth/wrong-password':'Incorrect password. Try again.',
      'auth/invalid-credential':'Incorrect email or password.',
      'auth/email-already-in-use':'Email already registered — sign in instead.',
      'auth/weak-password':'Password must be at least 6 characters.',
      'auth/invalid-email':'Enter a valid email address.',
      'auth/too-many-requests':'Too many attempts. Try again in a few minutes.',
      'auth/network-request-failed':'No internet connection. Check your network.',
    };
    errEl.textContent=msgs[e.code]||'Something went wrong. Try again.';
    errEl.className='auth-err show';
  });
}

function toggleAuthMode(){
  authMode=authMode==='signin'?'register':'signin';
  const s=authMode==='signin';
  $('auth-title').textContent=s?'Welcome back':'Create account';
  $('auth-btn').textContent=s?'Sign in':'Create account';
  $('auth-toggle-txt').textContent=s?"Don't have an account?":'Already have an account?';
  $('auth-pw').autocomplete=s?'current-password':'new-password';
  $('auth-err').className='auth-err';
}

function doSignOut(){
  if(!confirm('Sign out of Loopli?'))return;
  auth.signOut();
}

// ── CUSTOM MATERIALS ──────────────────────────────────────────────────────────
let editingCMatId=null;
const CTABS=[{k:'doll',l:'Doll'},{k:'pacifier',l:'Pacifier'},{k:'rattle',l:'Rattle'},{k:'icord',l:'I-cord'},{k:'set',l:'Set'},{k:'blanket',l:'Blanket'}];

function openCMat(id){
  editingCMatId=(id!=null)?id:null;
  const m=(id!=null)?(S.customMats||[]).find(x=>x.id===id):null;
  $('cmat-title').textContent=m?'Edit Material':'Add Material';
  $('cmat-n').value=m?.n||'';
  $('cmat-pp').value=m?.pp??'';
  $('cmat-pq').value=m?.pq??'';
  $('cmat-u').value=m?.u||'';
  const active=m?.tabs||[];
  $('cmat-tabs').innerHTML=CTABS.map(t=>`<button class="tab-toggle${active.includes(t.k)?' active':''}" data-tab="${t.k}" onclick="this.classList.toggle('active')">${t.l}</button>`).join('');
  $('cmat-del').style.display=m?'':'none';
  $('cmat-modal').style.display='flex';
}
function closeCMat(){$('cmat-modal').style.display='none';editingCMatId=null;}
function saveCMat(){
  const n=$('cmat-n').value.trim();
  const u=$('cmat-u').value.trim();
  const pp=parseFloat($('cmat-pp').value)||0;
  const pq=parseFloat($('cmat-pq').value)||1;
  if(!n){toast('Enter a material name','err');return;}
  if(!u){toast('Enter a unit (e.g. pcs, gram)','err');return;}
  const tabs=Array.from($('cmat-tabs').querySelectorAll('.tab-toggle.active')).map(b=>b.dataset.tab);
  if(!S.customMats)S.customMats=[];
  if(editingCMatId!=null){
    const m=S.customMats.find(x=>x.id===editingCMatId);
    if(m)Object.assign(m,{n,u,pp,pq,c:pp/pq,tabs});
  }else{
    const maxId=S.customMats.reduce((mx,m)=>Math.max(mx,m.id),999);
    S.customMats.push({id:maxId+1,n,u,pp,pq,c:pp/pq,tabs});
  }
  save();render();closeCMat();
  toast((editingCMatId!=null?'"'+n+'" updated':'"'+n+'" added')+' ✓');
}
function deleteCMat(){
  if(editingCMatId==null)return;
  const m=(S.customMats||[]).find(x=>x.id===editingCMatId);
  if(!m||!confirm('Delete "'+m.n+'"?'))return;
  S.customMats=S.customMats.filter(x=>x.id!==editingCMatId);
  Object.keys(S.c).forEach(t=>{if(S.c[t]?.qty)delete S.c[t].qty[editingCMatId];});
  save();render();closeCMat();toast('"'+m.n+'" deleted');
}

// Enter key support on login form
$('auth-email').addEventListener('keydown',e=>{if(e.key==='Enter')$('auth-pw').focus();});
$('auth-pw').addEventListener('keydown',e=>{if(e.key==='Enter')authSubmit();});

// Enter key moves focus to next input anywhere in the app
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const el=document.activeElement;
  if(!el||el.tagName!=='INPUT'||el.closest('.auth-ov'))return;
  e.preventDefault();
  const all=Array.from(document.querySelectorAll('input:not([disabled]):not([type="hidden"])'));
  const i=all.indexOf(el);
  if(i>=0&&i<all.length-1)all[i+1].focus();
  else el.blur();
});
</script>
